<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="bulbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Icon: Minimalist lightbulb with spark -->
  <g transform="translate(10, 15)">
    <!-- Bulb glass outline -->
    <path d="M 45 18 
             A 22 22 0 0 1 67 40 
             L 67 58 
             L 55 58 
             L 55 68 
             L 35 68 
             L 35 58 
             L 23 58 
             L 23 40 
             A 22 22 0 0 1 45 18 Z" 
          fill="none" 
          stroke="#1E293B" 
          stroke-width="3.5" 
          stroke-linejoin="round" />
    
    <!-- Screw base horizontal lines -->
    <line x1="33" y1="62" x2="57" y2="62" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" />
    <line x1="35" y1="66" x2="55" y2="66" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" />

    <!-- Spark inside the bulb (the 'idea' moment) -->
    <path d="M 45 25 
             L 48 36 
             L 60 39 
             L 48 42 
             L 45 53 
             L 42 42 
             L 30 39 
             L 42 36 Z" 
          fill="url(#sparkGrad)" />
  </g>

  <!-- Wordmark: "idea" -->
  <text x="100" y="78" 
        font-family="'Plus Jakarta Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="700" 
        font-size="52" 
        letter-spacing="-0.5" 
        fill="#1E293B">
    idea
  </text>

  <!-- Stylized tittle over 'i' (replacing the dot) -->
  <circle cx="104" cy="33" r="5.5" fill="url(#sparkGrad)" />
</svg>